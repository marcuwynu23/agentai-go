project: "agentai-go - Agentic AI Code Assistant"
description: "Go CLI for goal-based code generation with AI planning and in-process MCP-style servers. Supports Gemini, OpenAI, OpenRouter, and Ollama."

structure:
  directories:
    - path: cmd
      description: "CLI entry points and subcommands (Cobra)"
      files:
        - root.go
        - chat/chat.go
        - config/config.go
        - version/version.go

    - path: internal/config
      description: "Configuration: env + .agentai/config.json (local/global)"
      files:
        - config.go
        - file.go

    - path: internal/core
      description: "AI core, planner, memory, codebase analyzer, chat handler"
      files:
        - ai_core.go
        - gemini.go
        - providers.go
        - planner.go
        - memory_manager.go
        - codebase_analyzer.go
        - chat_handler.go
        - types.go

    - path: internal/types
      description: "Shared types (Plan, Step, Reasoning) to avoid import cycles"
      files:
        - types.go

    - path: internal/mcp
      description: "In-process file, command, and test servers + client"
      files:
        - client.go
        - file_server.go
        - command_server.go
        - test_server.go

    - path: docs
      description: "Documentation"
      files:
        - GUIDE.md
        - architecture.md

  root_files:
    - path: main.go
      description: "Entry point; calls cmd.Execute()"
      type: executable

    - path: go.mod
      description: "Go module and dependencies"
      type: config

    - path: go.sum
      description: "Module checksums"
      type: config

    - path: Makefile
      description: "Build, test, version-build targets"
      type: config

    - path: .env.example
      description: "Example environment configuration"
      type: config

    - path: README.md
      description: "Project overview and quick start"
      type: documentation

    - path: USAGE.md
      description: "Usage guide: config, providers, commands"
      type: documentation

    - path: .gitignore
      description: "Git ignore patterns"
      type: config

dependencies:
  github.com/joho/godotenv: "Load .env"
  github.com/spf13/cobra: "CLI framework"

setup_instructions:
  step_1: "Install Go 1.22+"
  step_2: "Download deps: go mod download"
  step_3: "Build: go build -o agentai ."
  step_4: "Configure: agentai config set provider gemini --local && agentai config set api_key YOUR_KEY --local"
  step_5: "Test: agentai chat \"create a hello world\""

execution_instructions:
  command: "agentai chat \"your goal here\""
  example: "agentai chat \"create a REST API with Express.js\""
  notes:
    - "Config from .agentai/config.json (--local or --global) or .env"
    - "Generated projects created in current directory under a named subdirectory"
    - "Memory stored in <project-name>/.memory.json"

implementation_status:
  completed:
    - "CLI with chat, config, version subcommands"
    - "Multi-provider AI (Gemini, OpenAI, OpenRouter, Ollama) via raw HTTP"
    - "Config: local/global .agentai/config.json and env"
    - "Planner and step execution"
    - "Memory manager and codebase analyzer"
    - "In-process file, command, and test servers"
    - "MCP client coordinating all step types"
  placeholders: []

file_descriptions:
  main.go: "Entry point; invokes cmd.Execute()."
  cmd/root.go: "Root command (agentai), persistent flags, registers chat, config, version."
  cmd/chat/chat.go: "Chat subcommand; loads config, validates API key, runs core.ChatCommand."
  cmd/config/config.go: "Config show/set with --local and --global."
  cmd/version/version.go: "Version subcommand; prints version, commit, build date."
  internal/config/config.go: "Load config from file + env (provider, api_key, model, base_url)."
  internal/config/file.go: "Paths for local/global .agentai/config.json; LoadAIConfig, SaveAIConfig."
  internal/core/ai_core.go: "AICore: rate limit, retry, GeneratePlan, GenerateCode, ReasonAboutStep, GenerateProjectName."
  internal/core/gemini.go: "Gemini API HTTP client (generateContent)."
  internal/core/providers.go: "GenerateContent dispatcher for gemini, openai, openrouter, ollama (raw HTTP)."
  internal/core/planner.go: "Planner: build prompt, call AI, parse plan JSON."
  internal/core/memory_manager.go: "Load/save .memory.json; conversation and history."
  internal/core/codebase_analyzer.go: "Scan files, analyze structure, detect issues, format for AI."
  internal/core/chat_handler.go: "Orchestrate chat: memory, project name, analyzer, plan, execute steps."
  internal/core/types.go: "Type aliases to internal/types (Plan, Step, Reasoning)."
  internal/types/types.go: "Plan, Step, Reasoning structs."
  internal/mcp/client.go: "MCP client; HandleFileCreation, HandleCodeGeneration, HandleTestCreation, HandleCommandExecution."
  internal/mcp/file_server.go: "Create, modify, read files in workspace."
  internal/mcp/command_server.go: "Validate and execute shell commands."
  internal/mcp/test_server.go: "Create test files with AI or template."
